# Fill in values then apply. Use 'kubectl create secret generic' or seal with
# Sealed Secrets / Azure Key Vault CSI driver for production.
#
# To base64-encode a value:  echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: subnet-manager-secret
  namespace: Network-Deployments
type: Opaque
stringData:                          # plaintext — K8s encodes automatically
  FLASK_SECRET_KEY: "change-me-32-chars-random-string"
  ADMIN_PASSWORD: "changeme"
  TEAMS_WEBHOOK_URL: ""

  # AI provider credentials (fill whichever applies)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""

  # Azure Service Principal for VNET/Firewall/UDR operations
  AZURE_CLIENT_ID: ""
  AZURE_CLIENT_SECRET: ""
  AZURE_TENANT_ID: ""
