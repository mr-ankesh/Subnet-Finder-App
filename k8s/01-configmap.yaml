apiVersion: v1
kind: ConfigMap
metadata:
  name: subnet-manager-config
  namespace: Network-Deployments
data:
  # ── AI Agent ───────────────────────────────────────────────────────────────
  AGENT_PROVIDER: "openai"                        # openai | anthropic
  OPENAI_BASE_URL: "https://your-llm-endpoint"   # Azure OpenAI / LM Studio / Ollama
  OPENAI_MODEL: "gpt-4o"
  OPENAI_API_VERSION: "2024-02-15-preview"

  # ── Azure Hub Topology ─────────────────────────────────────────────────────
  HUB_SUBSCRIPTION_ID: ""
  HUB_RESOURCE_GROUP: ""
  HUB_VNET_NAME: ""
  SPOKE_SUBSCRIPTION_ID: ""

  # ── UDR ────────────────────────────────────────────────────────────────────
  UDR_NAME_1: ""
  UDR_NAME_2: ""
  UDR_RESOURCE_GROUP: ""

  # ── Firewall Policy ────────────────────────────────────────────────────────
  FIREWALL_POLICY_NAME: ""
  FIREWALL_POLICY_RG: ""
  FIREWALL_RULE_COLLECTION_GROUP: ""

  # ── Peering defaults ───────────────────────────────────────────────────────
  PEERING_ALLOW_VNET_ACCESS: "true"
  PEERING_ALLOW_FORWARDED_TRAFFIC: "true"
  PEERING_ALLOW_GATEWAY_TRANSIT: "false"
  PEERING_USE_REMOTE_GATEWAYS: "false"

  # ── Region ────────────────────────────────────────────────────────────────
  DEFAULT_AZURE_REGION: "uaenorth"

  # ── App public URL (used in Teams notification deep-links) ────────────────
  SUBNET_FINDER_BASE_URL: "https://azsubnetmanager.presight.ai"
