services:
  subnet-manager-v2:
    build: .
    container_name: subnet-manager-v2
    ports:
      - "8081:8080"
    volumes:
      - ./data:/app/data     # SQLite DB + subnets.xlsx persisted here
    env_file:
      - .env                 # All secrets loaded from .env file
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
