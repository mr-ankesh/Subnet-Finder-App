<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Azure Subnet Manager{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Serif:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

  <nav id="mainNav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <div class="brand-icon">
          <img src="{{ url_for('static', filename='logo.png') }}"
               alt="Logo"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
          <i class="bi bi-diagram-3-fill" style="display:none;"></i>
        </div>
        <div>
          <span class="brand-title">Azure Subnet Manager</span>
          <span class="brand-sub">Network IP Address Management</span>
        </div>
      </a>
      <div class="nav-right">
        <div class="nav-clock">
          <i class="bi bi-clock"></i>
          <span id="currentTime"></span>
        </div>
      </div>
    </div>
  </nav>

  <div class="page-wrapper">
    {% block content %}{% endblock %}
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="footer-title">Azure Subnet Manager</span>
        <span class="footer-sub">Enterprise Network IP Address Management</span>
      </div>
      <div class="footer-copy">© 2025 Azure Subnet Manager. All rights reserved.</div>
    </div>
  </footer>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index:9999;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    function updateClock() {
      const el = document.getElementById('currentTime');
      if (el) el.textContent = new Date().toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    function showToast(message, type = 'success') {
      const icons = { success:'check-circle-fill', danger:'x-circle-fill', warning:'exclamation-triangle-fill', info:'info-circle-fill' };
      const id = 'toast_' + Date.now();
      document.getElementById('toastContainer').insertAdjacentHTML('beforeend', `
        <div id="${id}" class="gls-toast gls-toast-${type}" role="alert">
          <i class="bi bi-${icons[type]||'info-circle-fill'}"></i>
          <span>${message}</span>
          <button class="toast-close" onclick="this.closest('.gls-toast').remove()"><i class="bi bi-x"></i></button>
        </div>`);
      const el = document.getElementById(id);
      el.classList.add('show');
      setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 400); }, 4000);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
