<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Azure Subnet Manager{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-dark navbar-expand-lg" id="mainNav">
    <div class="container-fluid px-4">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <div class="brand-icon">
          <i class="bi bi-diagram-3-fill"></i>
        </div>
        <div>
          <span class="brand-title">Azure Subnet Manager</span>
          <span class="brand-sub d-block">Network IP Address Management</span>
        </div>
      </a>
      <div class="ms-auto d-flex align-items-center gap-3">
        <span class="navbar-clock">
          <i class="bi bi-clock me-1"></i>
          <span id="currentTime"></span>
        </span>
      </div>
    </div>
  </nav>

  <div class="page-wrapper">
    {% block content %}{% endblock %}
  </div>

  <!-- Toast Container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index: 9999;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Live clock
    function updateClock() {
      const el = document.getElementById('currentTime');
      if (el) el.textContent = new Date().toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Toast utility
    function showToast(message, type = 'success') {
      const icons = {
        success: 'check-circle-fill',
        danger:  'x-circle-fill',
        warning: 'exclamation-triangle-fill',
        info:    'info-circle-fill'
      };
      const id = 'toast_' + Date.now();
      const html = `
        <div id="${id}" class="toast align-items-center text-white bg-${type} border-0" role="alert" aria-live="assertive" aria-atomic="true">
          <div class="d-flex">
            <div class="toast-body">
              <i class="bi bi-${icons[type] || 'info-circle-fill'} me-2"></i>${message}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
          </div>
        </div>`;
      document.getElementById('toastContainer').insertAdjacentHTML('beforeend', html);
      const toastEl = document.getElementById(id);
      const toast = new bootstrap.Toast(toastEl, { delay: 4000 });
      toast.show();
      toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
