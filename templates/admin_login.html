{% extends "base.html" %}
{% block title %}Admin Login — Presight R&D | Azure Subnet Manager{% endblock %}

{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;">
  <div style="width:100%;max-width:400px;">

    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#0078D4,#00BCF2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.6rem;color:#fff;">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h1 style="font-family:var(--font-heading);font-size:1.4rem;font-weight:700;color:var(--text);margin:0 0 6px;">Admin Access</h1>
      <p style="font-size:13px;color:var(--text-muted);margin:0;">Enter your admin password to continue.</p>
    </div>

    <div class="glass-card" style="padding:28px;">
      {% if error %}
      <div style="background:rgba(209,52,56,0.12);border:1px solid rgba(209,52,56,0.3);border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:13px;color:#f87171;display:flex;align-items:center;gap:8px;">
        <i class="bi bi-x-circle-fill"></i> {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('admin_login') }}">
        <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
        <div style="margin-bottom:20px;">
          <label style="display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:8px;">Password</label>
          <input type="password" name="password" autofocus
            style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-family:var(--font-body);font-size:14px;padding:10px 14px;outline:none;box-sizing:border-box;"
            placeholder="Enter admin password">
        </div>
        <button type="submit" class="btn-hero" style="width:100%;justify-content:center;font-size:14px;">
          <i class="bi bi-shield-check me-2"></i>Login
        </button>
      </form>
    </div>

    <div style="text-align:center;margin-top:20px;">
      <a href="{{ url_for('requester_page') }}" style="font-size:13px;color:var(--text-muted);text-decoration:none;">
        <i class="bi bi-arrow-left me-1"></i>Go to Requester Portal
      </a>
    </div>

  </div>
</div>
{% endblock %}
